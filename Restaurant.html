<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Restaurant</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Header */
header {
  background: #ff4d4d;
  color: white;
  padding: 15px;
  text-align: center;
}

/* Hero */
.hero {
  background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5');
  background-size: cover;
  color: white;
  padding: 80px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 40px;
}

/* Section */
section {
  padding: 40px 20px;
  text-align: center;
}

/* Menu */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.menu-item {
  border: 1px solid #ddd;
  margin: 10px;
  padding: 15px;
  width: 200px;
  border-radius: 10px;
}

/* Gallery */
.gallery img {
  width: 100px;
  margin: 5px;
  border-radius: 10px;
}

/* Button */
.btn {
  background: #25D366;
  color: white;
  padding: 10px 20px;
  text-decoration: none;
  border-radius: 5px;
}

/* Footer */
footer {
  background: #333;
  color: white;
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <h1>My Restaurant</h1>
</header>

<div class="hero">
  <h1>Welcome to Our Restaurant 🍽️</h1>
  <p>Delicious Food | Fast Service</p>
</div>

<section>
  <h2>Our Menu</h2>
  <div class="menu">
    <div class="menu-item">
      <h3>Pizza</h3>
      <p>₹199</p>
    </div>
    <div class="menu-item">
      <h3>Burger</h3>
      <p>₹99</p>
    </div>
    <div class="menu-item">
      <h3>Pasta</h3>
      <p>₹149</p>
    </div>
  </div>
</section>

<section>
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
    <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">
    <img src="https://images.unsplash.com/photo-1551782450-a2132b4ba21d">
  </div>
</section>

<section>
  <h2>Order Now</h2>
  <a class="btn" href="https://wa.me/91XXXXXXXXXX">Order on WhatsApp</a>
</section>

<footer>
  <p>© 2026 My Restaurant</p>
</footer>

</body>
  </html>
